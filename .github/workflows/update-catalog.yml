name: Update manifests

# Regenerates catalog-manifest.js (from catalog/), coupons-manifest.js
# (from Discount.xlsx), and softwares-manifest.js (from Softwares.xlsx)
# every 10 minutes (subject to GitHub's scheduling delays — see notes),
# on every push that touches relevant files, and on manual dispatch from
# the Actions tab.
on:
  schedule:
    - cron: '*/10 * * * *'
  push:
    paths:
      - 'catalog/**'
      - 'Discount.xlsx'
      - 'Softwares.xlsx'
      - 'update-catalog.sh'
      - 'update-coupons.py'
      - 'update-softwares.py'
      - '.github/workflows/update-catalog.yml'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate catalog-manifest.js
        run: |
          chmod +x ./update-catalog.sh
          ./update-catalog.sh

      - name: Regenerate coupons-manifest.js
        run: |
          chmod +x ./update-coupons.py
          ./update-coupons.py

      - name: Regenerate softwares-manifest.js
        run: |
          chmod +x ./update-softwares.py
          ./update-softwares.py

      - name: Commit manifests if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet catalog-manifest.js coupons-manifest.js softwares-manifest.js; then
            echo "No manifest changes — nothing to commit."
            exit 0
          fi
          git add catalog-manifest.js coupons-manifest.js softwares-manifest.js
          git commit -m "chore: refresh manifests"
          git push
